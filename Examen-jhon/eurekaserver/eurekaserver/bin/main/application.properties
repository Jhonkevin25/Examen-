# ──────────────────────────────────────────────
# Nombre del servicio
# ──────────────────────────────────────────────
spring.application.name=eureka-server

# ──────────────────────────────────────────────
# Puerto estándar de Eureka
# ──────────────────────────────────────────────
server.port=8761

# ──────────────────────────────────────────────
# Configuración Eureka — el servidor NO se
# registra a sí mismo ni busca otros servidores
# (en un setup de un solo nodo / standalone)
# ──────────────────────────────────────────────
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# URL de la propia instancia (self-reference)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ──────────────────────────────────────────────
# Tiempo (segundos) antes de desregistrar un
# cliente que dejó de enviar heartbeats
# ──────────────────────────────────────────────
eureka.server.eviction-interval-timer-in-ms=15000

# ──────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info